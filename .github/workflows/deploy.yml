name: 🚀 Deploy to Production (main)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout код
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # Это и есть главное исправление!

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/task-tracker:latest
            ghcr.io/${{ github.repository_owner }}/task-tracker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Можно добавить: platforms: linux/amd64 (если нужно)

  deploy:
    needs: build          # ждём успешной сборки
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            set -euo pipefail

            # Репозиторная переменная DEPLOY_PROJECT_DIR (опционально). Пустая строка из секрета ломала деплой — игнорируем и берём дефолт.
            RAW_DIR="${{ vars.DEPLOY_PROJECT_DIR }}"
            PROJECT_DIR="${RAW_DIR:-/opt/apps/projects/pomodoro-task}"
            COMPOSE_FILE="$PROJECT_DIR/docker-compose.yml"
            WEB_IMAGE="ghcr.io/${{ github.repository_owner }}/task-tracker:${{ github.sha }}"

            if [ ! -f "$COMPOSE_FILE" ]; then
              echo "❌ Нет $COMPOSE_FILE — проверьте DEPLOY_PROJECT_DIR (сейчас: $PROJECT_DIR) и клон репозитория на сервере."
              exit 1
            fi

            echo "🚀 Деплой в: $PROJECT_DIR"
            mkdir -p "$PROJECT_DIR"
            cd "$PROJECT_DIR"

            echo "📥 Подтягиваем main..."
            git pull origin main --ff-only

            echo "🔑 Логинимся в GHCR..."
            echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            echo "📦 Тянем образы (web + db)..."
            export WEB_IMAGE
            docker compose -f "$COMPOSE_FILE" pull web db

            # Без --no-deps: поднимется PostgreSQL (db), иначе хост `db` в БД не резолвится — см. lifespan/SQLAlchemy.
            echo "♻️ Перезапускаем стек (web с зависимостью db)..."
            docker compose -f "$COMPOSE_FILE" up -d web

            echo "✅ Деплой завершён! $(date)"
            docker compose -f "$COMPOSE_FILE" ps
            docker compose -f "$COMPOSE_FILE" logs --tail=20 web