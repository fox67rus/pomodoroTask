name: 🚀 Deploy Task Tracker

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout код
        uses: actions/checkout@v4

      # ==================== СБОРКА И ПУШ В GHCR ====================
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/task-tracker:latest
            ghcr.io/${{ github.repository_owner }}/task-tracker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Если у тебя multi-stage Dockerfile — можно добавить build-args

      # ==================== ДЕПЛОЙ НА СЕРВЕР ====================
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            cd /var/www/task-tracker

            # Логинимся в GHCR
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Тянем свежий образ
            docker compose pull web

            # Перезапускаем только web (db остаётся нетронутым)
            docker compose up -d --no-deps web

            echo "✅ Деплой завершён! $(date)"
            docker compose ps