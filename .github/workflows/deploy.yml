name: 🚀 Deploy to Production (main)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout код
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # Это и есть главное исправление!

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/task-tracker:latest
            ghcr.io/${{ github.repository_owner }}/task-tracker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Можно добавить: platforms: linux/amd64 (если нужно)

  deploy:
    needs: build          # ждём успешной сборки
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            PROJECT_DIR="/opt/apps/projects/pomodoro-task"
            WEB_IMAGE="ghcr.io/${{ github.repository_owner }}/task-tracker:${{ github.sha }}"

            echo "🚀 Деплой в: $PROJECT_DIR"
            mkdir -p "$PROJECT_DIR"
            cd "$PROJECT_DIR"

            echo "📥 Подтягиваем main..."
            git pull origin main --ff-only

            echo "🔑 Логинимся в GHCR..."
            echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            echo "📦 Тянем новый образ..."
            export WEB_IMAGE
            docker compose pull web

            echo "♻️ Перезапускаем web..."
            docker compose up -d --no-deps web

            echo "✅ Деплой завершён! $(date)"
            docker compose ps
            docker compose logs --tail=20 web