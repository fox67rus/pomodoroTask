<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "Pomodoro Task Tracker" }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/app.css') }}">
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
    <div class="mx-auto flex min-h-screen max-w-7xl flex-col px-4 py-6">
        <header class="mb-8 flex flex-wrap items-center justify-between gap-4">
            <a href="/dashboard" class="text-xl font-bold tracking-tight">PomodoroTask</a>
            <nav class="flex items-center gap-3 text-sm text-slate-300">
                {% if user %}
                    <a class="nav-link" href="/dashboard">Dashboard</a>
                    <a class="nav-link" href="/kanban">Kanban</a>
                    <a class="nav-link" href="/pomodoro">Pomodoro</a>
                    <a class="nav-link" href="/tasks/new">Новая задача</a>
                    <form action="/auth/logout" method="post">
                        <button class="rounded-lg bg-slate-800 px-3 py-2 hover:bg-slate-700" type="submit">Выйти</button>
                    </form>
                {% else %}
                    <a class="nav-link" href="/auth/login">Войти</a>
                    <a class="rounded-lg bg-cyan-500 px-3 py-2 font-semibold text-slate-950 hover:bg-cyan-400" href="/auth/register">Регистрация</a>
                {% endif %}
            </nav>
        </header>

        <main class="flex-1">
            {% block content %}{% endblock %}
        </main>
    </div>
    <script src="{{ url_for('static', path='/js/kanban.js') }}"></script>
    <script src="{{ url_for('static', path='/js/pomodoro.js') }}"></script>
</body>
</html>
