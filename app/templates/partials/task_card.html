<article class="task-card rounded-xl border border-slate-700 bg-slate-900 p-4 shadow-lg" data-task-id="{{ task.id }}">
    <div class="mb-3 flex items-start justify-between gap-3">
        <div>
            <h3 class="font-semibold text-slate-50">{{ task.title }}</h3>
            {% if task.description %}
                <p class="mt-1 text-sm text-slate-400">{{ task.description }}</p>
            {% endif %}
        </div>
        <span class="rounded-full px-2 py-1 text-xs font-semibold
            {% if task.priority.value == 'high' %}bg-red-500/20 text-red-200
            {% elif task.priority.value == 'medium' %}bg-amber-500/20 text-amber-200
            {% else %}bg-emerald-500/20 text-emerald-200{% endif %}">
            {{ task.priority.value }}
        </span>
    </div>
    <div class="mb-3 flex flex-wrap gap-2">
        {% for tag in task.tags %}
            <span class="rounded-full bg-slate-800 px-2 py-1 text-xs text-slate-300">#{{ tag }}</span>
        {% endfor %}
    </div>
    <div class="flex items-center justify-between text-xs text-slate-500">
        <span>{% if task.deadline %}до {{ task.deadline.strftime("%d.%m.%Y %H:%M") }}{% else %}без дедлайна{% endif %}</span>
        <a class="text-cyan-300 hover:text-cyan-200" href="/tasks/{{ task.id }}/edit">Редактировать</a>
    </div>
</article>
